<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11141b" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="基于 Tauri 与火山方舟的本地 Workflow 编排、运行和蒸馏智能体对话工具。" />
    <title>Ark 蒸馏智能体 · Workflow</title>
  </head>
  <body>
    <div id="app">
      <nav id="sidebar" aria-label="主导航">
        <div class="brand">女娲 · Ark</div>
        <button id="nav-settings" class="nav-btn active" data-view="settings" aria-controls="view-settings" aria-current="page">⚙️ 设置</button>
        <button id="nav-editor" class="nav-btn" data-view="editor" aria-controls="view-editor">🧩 Workflow</button>
        <button id="nav-runner" class="nav-btn" data-view="runner" aria-controls="view-runner">▶️ 运行</button>
        <button id="nav-chat" class="nav-btn" data-view="chat" aria-controls="view-chat">💬 对话</button>
        <div class="nav-foot">单独调用火山方舟 · 认知蒸馏闭环</div>
      </nav>
      <main id="main" tabindex="-1">
        <section id="view-settings" class="view active" aria-labelledby="nav-settings"></section>
        <section id="view-editor" class="view" aria-labelledby="nav-editor" hidden></section>
        <section id="view-runner" class="view" aria-labelledby="nav-runner" hidden></section>
        <section id="view-chat" class="view" aria-labelledby="nav-chat" hidden></section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
